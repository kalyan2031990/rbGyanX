# Site / technique plan-quality index packs (physical dosimetry).
# Used for reporting columns and optional WARNING checks — separate from QUANTEC NTCP limits.

HN:
  oar_canonicals:
    - Parotid_L
    - Parotid_R
    - Submandibular_L
    - Submandibular_R
    - Mandible
    - SpinalCord
    - Larynx
    - OralCavity
  technique_profiles:
    conventional:
      report_metrics:
        TARGET: [D95_gy, D98_gy, D50_gy, D2_gy, HI, CI, V95pct, V100pct, integral_dose_gy_cm3]
        OAR: [Dmean_gy, Dmax_gy, V20Gy_cc, integral_dose_gy_cm3]
      checks:
        - {role: TARGET, metric: D95_gy, min_percent_rx: 95.0, severity: WARNING}
        - {role: TARGET, metric: HI, max_value: 0.15, severity: WARNING}
    hypofractionated:
      report_metrics:
        TARGET: [D95_gy, D98_gy, D2_gy, HI, CI, V100pct, integral_dose_gy_cm3]
        OAR: [Dmean_gy, Dmax_gy, integral_dose_gy_cm3]
      checks:
        - {role: TARGET, metric: D95_gy, min_percent_rx: 90.0, severity: WARNING}

